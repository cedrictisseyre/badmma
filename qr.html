<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR d'accès — Badminton vs MMA</title>
    <style>
        :root { --accent: #6c5ce7; }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f4f5fb; color: #1a1c2b;
            display: flex; align-items: center; justify-content: center; padding: 2rem;
        }
        .card {
            background: #fff; border-radius: 20px; padding: 2.4rem;
            box-shadow: 0 20px 60px rgba(0,0,0,.12); text-align: center; max-width: 460px; width: 100%;
        }
        h1 { margin: 0 0 .3rem; font-size: 1.5rem; }
        .sub { color: #6b7196; margin: 0 0 1.6rem; }
        .qr { display: inline-flex; padding: 1rem; background: #fff; border: 1px solid #e6e8f2; border-radius: 16px; }
        .qr img { display: block; width: 260px; height: 260px; image-rendering: pixelated; }
        .url {
            margin: 1.4rem 0 0; word-break: break-all; font-size: .9rem;
            background: #f0f1f8; padding: .7rem 1rem; border-radius: 10px; color: #3a3f66;
        }
        .hint { color: #6b7196; font-size: .88rem; margin-top: 1rem; }
        .actions { margin-top: 1.6rem; display: flex; gap: .6rem; justify-content: center; }
        button, a.btn {
            border: none; border-radius: 10px; padding: .7rem 1.2rem; font-size: .95rem; font-weight: 600;
            cursor: pointer; text-decoration: none;
        }
        .primary { background: var(--accent); color: #fff; }
        .ghost { background: #eceef7; color: #3a3f66; }
        .error { color: #c0392b; font-size: .9rem; margin-top: 1rem; }
        .hidden { display: none; }

        @media print {
            body { background: #fff; padding: 0; }
            .card { box-shadow: none; }
            .actions { display: none; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏸 vs 🥊 Badminton vs MMA</h1>
        <p class="sub">Scannez pour accéder à l'application</p>

        <div class="qr">
            <img id="qr-img" alt="QR code d'accès à l'application">
        </div>

        <p class="url" id="url-text"></p>
        <p class="hint">Ouvrez l'appareil photo de votre smartphone et visez le QR code.</p>
        <p class="error hidden" id="qr-error"></p>

        <div class="actions">
            <button class="primary" onclick="window.print()">🖨️ Imprimer</button>
            <a class="btn ghost" id="open-link" href="#">Ouvrir l'application</a>
        </div>
    </div>

    <script>
        (function () {
            // URL de l'application = origine courante (protocole + domaine).
            var appUrl = window.location.origin + '/';
            document.getElementById('url-text').textContent = appUrl;
            document.getElementById('open-link').href = appUrl;

            // Génération du QR code (image) à partir de l'URL.
            var size = 520; // haute résolution pour l'impression
            var src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size +
                      '&margin=8&data=' + encodeURIComponent(appUrl);
            var img = document.getElementById('qr-img');
            img.src = src;
            img.onerror = function () {
                document.getElementById('qr-error').textContent =
                    "Impossible de générer le QR code (connexion Internet requise). L'URL ci-dessus reste utilisable.";
                document.getElementById('qr-error').classList.remove('hidden');
            };
        })();
    </script>
</body>
</html>
